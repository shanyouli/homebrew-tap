name: Brew Tap

inputs:
  HOMEBREW_GITHUB_API_TOKEN:
    description: 'Homebrew GitHub API Token'
    required: true

runs:
  using: 'composite'

  steps:
    - name: Add Tap
      env:
        HOMEBREW_GITHUB_API_TOKEN: ${{ inputs.HOMEBREW_GITHUB_API_TOKEN }}
      shell: bash -ieo pipefail {0}
      run: |
        # Clean up stale update locks left by the previous install.sh run to
        # avoid "Another `brew update` process is already running" conflicts.
        rm -rf "$(brew --prefix)/var/homebrew/locks/" 2>/dev/null || true
        brew tap shanyouli/tap
        # Drop the redundant `brew update`: install.sh already updated Homebrew
        # and `brew tap` just synced this tap repository, so running `brew
        # update` again immediately would race for the update lock.

    - name: Install Homebrew's dependencies
      shell: bash -ieo pipefail {0}
      run: |
        brew install ripgrep sd gcc parallel coreutils
        brew unlink coreutils && brew link coreutils
        brew install-bundler-gems --groups "audit,style"

    - uses: oleksiyrudenko/gha-git-credentials@v2-latest
      with:
        global: true
        name: 'shanyouli-Bot'
        email: 'shanyouli-bot@aliyun.com'
        token: '${{ inputs.HOMEBREW_GITHUB_API_TOKEN }}'

    - name: show git context
      shell: bash -ieo pipefail {0}
      run: |
        cat $HOME/.gitconfig
        cat $GITHUB_ENV
